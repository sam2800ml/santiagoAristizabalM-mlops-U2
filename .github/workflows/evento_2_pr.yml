name: Evento 2 - Merge a Main

on:
  workflow_run:
    workflows: ["Evento 1 - PR"]
    types:
      - completed

permissions:
  contents: read
  packages: write

jobs:
  pruebas-y-despliegue:
    runs-on: ubuntu-latest

    steps:
      - name: 1. Traer el código
        uses: actions/checkout@v4

      - name: 2. Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 3. Instalar dependencias usando uv
        uses: astral-sh/setup-uv@v4
        with:
            enable-cache: true
            
      - name: 4. Ejecutar Pruebas
        run: |
            uv sync
            PYTHONPATH=. uv run pytest tests/

      - name: 5. Convertir nombre del epo a minúsculas para Docker
        run: echo "REPO_MINUSCULAS=${GITHUB_REPOSITORY,,}" >> ${GITHUB_ENV}

      - name: 6. Iniciar sesión en GitHub Packages (GHCR)
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 7. Construir y publicar imagen Docker
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ghcr.io/${{ env.REPO_MINUSCULAS }}/evaluacion-medica:latest